<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0e0c">
  <meta name="description" content="Reproductor de Audio — Sonic Unicorn Lab">
  <title>Reproductor de Audio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-0:        #080d0a;
      --bg-1:        #0e1510;
      --bg-2:        #141d16;
      --bg-card:     rgba(14, 21, 16, 0.94);
      --text-1:      #e2ddd6;
      --text-2:      #a09688;
      --text-3:      #627060;
      --amber:       #c8943a;
      --amber-lt:    #dba84e;
      --amber-dk:    #9e6e28;
      --sage:        #7aaf86;
      --sage-dk:     #4e7e5a;
      --border-1:    rgba(200, 148, 58, 0.18);
      --border-2:    rgba(200, 148, 58, 0.35);
      --glow-a:      rgba(200, 148, 58, 0.22);
      --glow-s:      rgba(122, 175, 134, 0.15);
      --ease:        cubic-bezier(.4,0,.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-0);
      color: var(--text-1);
      line-height: 1.55;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── CANVAS PARTÍCULAS ── */
    #cnv {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── ONDA SVG FONDO ── */
    .wave-bg {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 220px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.07;
    }

    /* ── CONTENEDOR CENTRAL ── */
    .wrap {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      padding: 2rem 1.2rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.6rem;
    }

    /* ── HERO / LOGO ── */
    .hero {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .8rem;
    }

    .logo-ring {
      display: inline-block;
      width: 120px; height: 120px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--amber), var(--sage-dk));
      box-shadow: 0 0 32px var(--glow-a);
    }

    .logo-ring img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      background: var(--bg-1);
    }

    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.7rem;
      color: var(--amber-lt);
      letter-spacing: -.3px;
      line-height: 1.15;
    }

    .hero-eyebrow {
      font-size: .62rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .divider {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; width: 160px;
    }
    .divider-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--amber-dk), transparent);
    }
    .divider-gem {
      width: 5px; height: 5px;
      background: var(--amber);
      transform: rotate(45deg);
    }

    /* ── PLAYLIST ── */
    .playlist {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }

    .pl-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: .6rem .8rem;
      background: rgba(200,148,58,.04);
      border: 1px solid var(--border-1);
      border-radius: 10px;
      cursor: pointer;
      transition: background .2s var(--ease), border-color .2s var(--ease), transform .15s var(--ease);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .pl-item:hover {
      background: rgba(200,148,58,.1);
      border-color: var(--amber-dk);
      transform: translateX(3px);
    }

    .pl-item.active {
      background: rgba(200,148,58,.13);
      border-color: var(--amber);
      box-shadow: 0 0 12px var(--glow-a);
    }

    .pl-num {
      font-size: .68rem;
      color: var(--text-3);
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .pl-info { flex: 1; min-width: 0; }

    .pl-title {
      font-size: .83rem;
      font-weight: 500;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pl-artist {
      font-size: .6rem;
      color: var(--text-3);
      text-transform: uppercase;
    }

    .pl-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 14px;
      flex-shrink: 0;
    }

    .pl-bars span {
      width: 3px;
      border-radius: 1px;
      background: var(--amber);
      height: 3px;
      opacity: 0;
      transition: height .15s, opacity .15s;
    }

    .pl-item.active .pl-bars span {
      opacity: 1;
      animation: eq 0.7s ease-in-out infinite alternate;
    }

    .pl-item.active .pl-bars span:nth-child(2) { animation-delay: .25s; }
    .pl-item.active .pl-bars span:nth-child(3) { animation-delay: .5s; }

    @keyframes eq {
      from { height: 3px; }
      to   { height: 13px; }
    }

    /* ── PLAYER CARD ── */
    .player-card {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border-2);
      border-radius: 18px;
      padding: 1.3rem 1.2rem;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }

    .track-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: .9rem;
    }

    .track-thumb {
      width: 48px; height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--amber-dk);
      flex-shrink: 0;
      background: var(--bg-2);
    }

    .track-details { flex: 1; min-width: 0; }

    .track-name {
      font-size: .88rem;
      font-weight: 600;
      color: var(--amber-lt);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-sub {
      font-size: .6rem;
      color: var(--text-3);
      text-transform: uppercase;
    }

    /* ── VISUALIZADOR ── */
    .vis-wrap {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      margin-bottom: .8rem;
      overflow: hidden;
    }

    .vbar {
      width: 3px;
      background: linear-gradient(to top, var(--sage-dk), var(--amber));
      border-radius: 2px;
      height: 3px;
      transition: height .06s linear;
    }

    /* ── PROGRESO ── */
    .prog-wrap { margin-bottom: .6rem; }

    .prog-track {
      height: 4px;
      background: var(--border-1);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
    }

    .prog-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--sage-dk), var(--amber));
      border-radius: 3px;
      position: relative;
      transition: width .1s linear;
    }

    .prog-fill::after {
      content: '';
      position: absolute;
      right: -4px; top: 50%;
      transform: translateY(-50%);
      width: 10px; height: 10px;
      background: var(--amber-lt);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--glow-a);
      opacity: 0;
      transition: opacity .15s;
    }

    .prog-track:hover .prog-fill::after { opacity: 1; }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: .65rem;
      color: var(--text-3);
      margin-top: 4px;
    }

    /* ── CONTROLES ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin: .9rem 0;
    }

    .ctrl-btn {
      background: rgba(200,148,58,.08);
      border: 1px solid var(--border-2);
      border-radius: 50%;
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--amber-lt);
      font-size: 1rem;
      transition: background .2s, transform .15s, box-shadow .2s;
      -webkit-tap-highlight-color: transparent;
    }

    .ctrl-btn:hover {
      background: rgba(200,148,58,.2);
      transform: scale(1.06);
    }

    .ctrl-btn:active { transform: scale(.96); }

    .play-btn {
      width: 60px; height: 60px;
      font-size: 1.5rem;
      background: linear-gradient(135deg, var(--amber), var(--sage-dk));
      border: none;
      color: var(--bg-0);
      box-shadow: 0 0 18px var(--glow-a);
    }

    .play-btn:hover {
      box-shadow: 0 0 26px var(--glow-a), 0 0 10px var(--glow-s);
      transform: scale(1.06);
    }

    /* ── VOLUMEN ── */
    .vol-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: .4rem;
    }

    .vol-icon { font-size: .85rem; color: var(--text-3); }

    .vol-slider {
      flex: 1;
      height: 3px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--border-1);
      border-radius: 2px;
      outline: none;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      background: var(--amber-lt);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 4px var(--glow-a);
    }

    .status-line {
      text-align: center;
      font-size: .68rem;
      color: var(--text-3);
      margin-top: .75rem;
      font-style: italic;
      min-height: 1em;
    }

    /* ── WELCOME OVERLAY ── */
    #welcome-overlay {
      position: fixed; inset: 0;
      background: rgba(8,13,10,.92);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      text-align: center;
      padding: 2rem;
    }

    .ov-logo {
      width: 110px; height: 110px;
      border-radius: 50%;
      border: 3px solid var(--amber);
      object-fit: cover;
      box-shadow: 0 0 30px var(--glow-a);
      animation: pulse-ring 2s ease-in-out infinite;
      background: var(--bg-1);
    }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 20px var(--glow-a); }
      50% { box-shadow: 0 0 40px rgba(200,148,58,.35); }
    }

    .ov-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      color: var(--amber-lt);
    }

    .ov-sub {
      font-size: .72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .ov-note {
      font-size: .82rem;
      color: var(--text-2);
      max-width: 280px;
    }

    .ov-btn {
      padding: .85rem 2.2rem;
      background: linear-gradient(135deg, var(--amber), var(--sage-dk));
      border: none;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--bg-0);
      cursor: pointer;
      box-shadow: 0 0 24px var(--glow-a);
      transition: transform .15s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: .5px;
    }

    .ov-btn:hover { transform: scale(1.04); box-shadow: 0 0 32px var(--glow-a); }
    .ov-btn:active { transform: scale(.97); }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      font-size: .6rem;
      letter-spacing: 2px;
      color: var(--text-3);
      text-transform: uppercase;
      padding-top: .5rem;
    }

    /* ── FADE IN ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero         { animation: fadeUp .5s var(--ease) both; }
    .playlist     { animation: fadeUp .55s .08s var(--ease) both; }
    .player-card  { animation: fadeUp .6s .15s var(--ease) both; }
  </style>
</head>
<body>

<canvas id="cnv"></canvas>

<svg class="wave-bg" viewBox="0 0 1440 220" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <path fill="var(--amber)" d="M0,80 C240,140 480,20 720,80 C960,140 1200,20 1440,80 L1440,220 L0,220 Z"/>
  <path fill="var(--sage)"  d="M0,120 C240,60 480,160 720,120 C960,80 1200,160 1440,120 L1440,220 L0,220 Z" opacity=".6"/>
</svg>

<!-- OVERLAY DE BIENVENIDA -->
<div id="welcome-overlay">
  <img class="ov-logo" src="logo_reproductor.png" alt="Reproductor de Audio"
    onerror="this.style.display='none'">
  <div>
    <div class="ov-title">Reproductor de Audio</div>
    <div class="ov-sub">Sonic Unicorn Lab</div>
  </div>
  <p class="ov-note">Toca el botón para escuchar el audio</p>
  <button class="ov-btn" id="enter-btn">▶ &nbsp;Reproducir</button>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div class="wrap">

  <!-- HERO -->
  <div class="hero">
    <div class="logo-ring">
      <img src="logo_reproductor.png" alt="Reproductor de Audio"
        onerror="this.style.display='none'">
    </div>
    <h1>Reproductor de Audio</h1>
    <p class="hero-eyebrow">Sonic Unicorn Lab</p>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-gem"></div>
      <div class="divider-line"></div>
    </div>
  </div>

  <!-- PLAYLIST -->
  <div class="playlist" id="playlist"></div>

  <!-- PLAYER CARD -->
  <div class="player-card">

    <div class="track-row">
      <img class="track-thumb" src="logo_reproductor.png" alt="track"
        onerror="this.style.display='none'">
      <div class="track-details">
        <div class="track-name" id="track-name">Enseñanza Lean para Aprendices</div>
        <div class="track-sub">Audio</div>
      </div>
    </div>

    <!-- Visualizador -->
    <div class="vis-wrap" id="visualizer"></div>

    <!-- Barra de progreso -->
    <div class="prog-wrap">
      <div class="prog-track" id="prog-track">
        <div class="prog-fill" id="prog-fill"></div>
      </div>
      <div class="time-row">
        <span id="cur-time">0:00</span>
        <span id="tot-time">0:00</span>
      </div>
    </div>

    <!-- Controles -->
    <div class="controls">
      <button class="ctrl-btn" id="prev-btn" aria-label="Anterior">&#9664;&#9664;</button>
      <button class="ctrl-btn play-btn" id="play-btn" aria-label="Play/Pause">&#9654;</button>
      <button class="ctrl-btn" id="next-btn" aria-label="Siguiente">&#9654;&#9654;</button>
    </div>

    <!-- Volumen -->
    <div class="vol-row">
      <span class="vol-icon">🔈</span>
      <input type="range" class="vol-slider" id="vol-slider" min="0" max="1" step="0.01" value="0.8">
      <span class="vol-icon">🔊</span>
    </div>

    <div class="status-line" id="status-line">Listo</div>
  </div>

  <div class="footer">Sonic Unicorn Lab · Audio Player</div>
</div>

<audio id="audio" preload="auto"></audio>

<script>
// ═══════════════════════════════════════════════════════════
//  TRACKS — agregar más objetos aquí para ampliar el catálogo
// ═══════════════════════════════════════════════════════════
const TRACKS = [
  {
    title: 'Enseñanza Lean para Aprendices',
    file:  'https://raw.githubusercontent.com/Edheller33/audios_qr/main/ense%C3%B1anza_lean_para_aprendices.mp3'
  }
];

// ─── DOM refs ───────────────────────────────────────────────
const audio      = document.getElementById('audio');
const playBtn    = document.getElementById('play-btn');
const prevBtn    = document.getElementById('prev-btn');
const nextBtn    = document.getElementById('next-btn');
const progTrack  = document.getElementById('prog-track');
const progFill   = document.getElementById('prog-fill');
const curTimeEl  = document.getElementById('cur-time');
const totTimeEl  = document.getElementById('tot-time');
const volSlider  = document.getElementById('vol-slider');
const statusEl   = document.getElementById('status-line');
const trackNameEl= document.getElementById('track-name');
const visEl      = document.getElementById('visualizer');
const playlistEl = document.getElementById('playlist');
const overlay    = document.getElementById('welcome-overlay');
const enterBtn   = document.getElementById('enter-btn');

let currentIdx = 0;
let isPlaying  = false;
let wantsPlay  = false;
let rafId      = null;
let vBars      = [];

// ═══════════════════════════════════════════════════════════
//  CANVAS DE PARTÍCULAS
// ═══════════════════════════════════════════════════════════
(function initParticles() {
  const canvas = document.getElementById('cnv');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [];
  const mouse = { x: -999, y: -999 };
  const COUNT = 60;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function rand(a, b) { return a + Math.random() * (b - a); }

  function spawn() {
    particles = [];
    for (let i = 0; i < COUNT; i++) {
      particles.push({
        x: rand(0, W), y: rand(0, H),
        vx: rand(-.18, .18), vy: rand(-.18, .18),
        r: rand(1, 2.2),
        a: rand(.15, .55)
      });
    }
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      const dx = p.x - mouse.x, dy = p.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const alpha = dist < 90 ? p.a * 1.8 : p.a;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,148,58,${alpha})`;
      ctx.fill();
    });

    // Líneas de conexión
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const a = particles[i], b = particles[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const d  = Math.sqrt(dx * dx + dy * dy);
        if (d < 100) {
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `rgba(200,148,58,${0.06 * (1 - d / 100)})`;
          ctx.lineWidth = .6;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', () => { resize(); spawn(); });
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('touchmove', e => {
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
  }, { passive: true });

  resize(); spawn(); loop();
})();

// ═══════════════════════════════════════════════════════════
//  VISUALIZADOR DE BARRAS
// ═══════════════════════════════════════════════════════════
function buildVisualizer() {
  visEl.innerHTML = '';
  vBars = [];
  for (let i = 0; i < 36; i++) {
    const b = document.createElement('div');
    b.className = 'vbar';
    visEl.appendChild(b);
    vBars.push(b);
  }
}

function tickVis() {
  if (!isPlaying) { vBars.forEach(b => b.style.height = '3px'); return; }
  const t = Date.now() * 0.004;
  vBars.forEach((b, i) => {
    const v = (Math.sin(t + i * 0.45) * 0.5 + 0.5)
            * (Math.sin(t * 1.3 + i * 0.2) * 0.3 + 0.7);
    const h = 3 + v * 38;
    b.style.height = h.toFixed(1) + 'px';
  });
  rafId = requestAnimationFrame(tickVis);
}

function startVis() { if (rafId) cancelAnimationFrame(rafId); tickVis(); }
function stopVis()  {
  if (rafId) cancelAnimationFrame(rafId);
  rafId = null;
  vBars.forEach(b => b.style.height = '3px');
}

// ═══════════════════════════════════════════════════════════
//  PLAYLIST UI
// ═══════════════════════════════════════════════════════════
function buildPlaylist() {
  playlistEl.innerHTML = '';
  TRACKS.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'pl-item' + (i === currentIdx ? ' active' : '');
    el.dataset.idx = i;
    el.innerHTML = `
      <span class="pl-num">${i + 1}</span>
      <div class="pl-info">
        <div class="pl-title">${t.title}</div>
        <div class="pl-artist">Audio</div>
      </div>
      <div class="pl-bars"><span></span><span></span><span></span></div>
    `;
    el.addEventListener('click', () => loadTrack(i, true));
    el.addEventListener('touchend', e => { e.preventDefault(); loadTrack(i, true); });
    playlistEl.appendChild(el);
  });
}

function updatePlaylistActive() {
  document.querySelectorAll('.pl-item').forEach((el, i) => {
    el.classList.toggle('active', i === currentIdx);
  });
}

// ═══════════════════════════════════════════════════════════
//  UTILIDADES
// ═══════════════════════════════════════════════════════════
function fmt(s) {
  if (!isFinite(s) || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

function setStatus(txt) { statusEl.textContent = txt; }
function setPlayIcon(p) { playBtn.innerHTML = p ? '⏸' : '&#9654;'; }

// ═══════════════════════════════════════════════════════════
//  CARGA Y REPRODUCCIÓN
// ═══════════════════════════════════════════════════════════
function loadTrack(idx, autoplay) {
  if (idx < 0) idx = TRACKS.length - 1;
  if (idx >= TRACKS.length) idx = 0;

  currentIdx = idx;
  const t = TRACKS[idx];

  progFill.style.width = '0%';
  curTimeEl.textContent = '0:00';
  totTimeEl.textContent = '0:00';
  trackNameEl.textContent = t.title;

  // Sin audio.load() para evitar delay
  audio.src = t.file;

  updatePlaylistActive();
  stopVis();
  setPlayIcon(false);
  isPlaying = false;

  if (autoplay) {
    wantsPlay = true;
    setStatus('Cargando · ' + t.title + '…');
    const p = audio.play();
    if (p !== undefined) {
      p.then(() => {
        isPlaying = true; wantsPlay = false;
        setPlayIcon(true);
        setStatus('Reproduciendo · ' + t.title);
        startVis();
      }).catch(() => { setStatus('Cargando…'); });
    }
  } else {
    wantsPlay = false;
    setStatus('Listo · ' + t.title);
  }
}

// ═══════════════════════════════════════════════════════════
//  EVENTOS AUDIO
// ═══════════════════════════════════════════════════════════
audio.addEventListener('canplay', () => {
  totTimeEl.textContent = fmt(audio.duration);
  if (wantsPlay && !isPlaying) {
    audio.play().then(() => {
      isPlaying = true; wantsPlay = false;
      setPlayIcon(true);
      setStatus('Reproduciendo · ' + TRACKS[currentIdx].title);
      startVis();
    }).catch(err => { setStatus('Error al reproducir — ' + err.message); wantsPlay = false; });
  }
});

audio.addEventListener('loadedmetadata', () => { totTimeEl.textContent = fmt(audio.duration); });

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progFill.style.width = pct + '%';
  curTimeEl.textContent = fmt(audio.currentTime);
  totTimeEl.textContent = fmt(audio.duration);
});

audio.addEventListener('ended', () => {
  isPlaying = false; stopVis(); setPlayIcon(false);
  // Si hay más tracks, avanza; si es el único, vuelve al inicio sin autoplay
  const next = (currentIdx + 1) % TRACKS.length;
  loadTrack(next, TRACKS.length > 1);
});

audio.addEventListener('error', e => {
  isPlaying = false; wantsPlay = false; stopVis(); setPlayIcon(false);
  const code = audio.error ? audio.error.code : '?';
  setStatus('⚠ No se pudo cargar el audio (código ' + code + ')');
  console.error('Audio error:', audio.error, e);
});

audio.addEventListener('waiting', () => { setStatus('Cargando…'); });

audio.addEventListener('playing', () => {
  isPlaying = true; wantsPlay = false;
  setPlayIcon(true);
  setStatus('Reproduciendo · ' + TRACKS[currentIdx].title);
  startVis();
});

audio.addEventListener('pause', () => {
  if (!audio.ended) {
    isPlaying = false; stopVis(); setPlayIcon(false);
    setStatus('Pausado · ' + TRACKS[currentIdx].title);
  }
});

// ═══════════════════════════════════════════════════════════
//  BOTONES
// ═══════════════════════════════════════════════════════════
function playPause() {
  if (!audio.src || audio.src === window.location.href) { loadTrack(0, true); return; }
  if (isPlaying) { audio.pause(); }
  else { audio.play().catch(err => setStatus('Error: ' + err.message)); }
}

playBtn.addEventListener('click', playPause);
nextBtn.addEventListener('click', () => loadTrack(currentIdx + 1, isPlaying));
prevBtn.addEventListener('click', () => {
  if (audio.currentTime > 3) { audio.currentTime = 0; }
  else { loadTrack(currentIdx - 1, isPlaying); }
});

[playBtn, nextBtn, prevBtn].forEach(btn => {
  btn.addEventListener('touchend', e => { e.preventDefault(); btn.click(); });
});

// ═══════════════════════════════════════════════════════════
//  PROGRESO (click + touch)
// ═══════════════════════════════════════════════════════════
function seekTo(e) {
  if (!audio.duration) return;
  const rect = progTrack.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  audio.currentTime = pct * audio.duration;
  progFill.style.width = (pct * 100) + '%';
}

progTrack.addEventListener('click', seekTo);
progTrack.addEventListener('touchstart', seekTo, { passive: true });

// ═══════════════════════════════════════════════════════════
//  VOLUMEN
// ═══════════════════════════════════════════════════════════
audio.volume = 0.8;
volSlider.addEventListener('input', () => { audio.volume = parseFloat(volSlider.value); });

// ═══════════════════════════════════════════════════════════
//  OVERLAY → AUTOPLAY al primer toque
// ═══════════════════════════════════════════════════════════
function startApp() {
  overlay.style.opacity = '0';
  overlay.style.transition = 'opacity .4s ease';
  setTimeout(() => overlay.style.display = 'none', 420);
  loadTrack(0, true);   // Autoplay inmediato al cerrar overlay
}

enterBtn.addEventListener('click', startApp);
enterBtn.addEventListener('touchend', e => { e.preventDefault(); startApp(); });

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
buildVisualizer();
buildPlaylist();
</script>
</body>
</html>
